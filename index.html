<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Path Flood Fill Optimizer</title>
    <style>
        :root { --accent: #00fbff; --bg: #0d0d0d; --panel: #1a1a1a; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { background: var(--panel); padding: 20px; border-radius: 8px; display: flex; gap: 20px; flex-wrap: wrap; border: 1px solid #333; margin-bottom: 20px; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .group { display: flex; flex-direction: column; gap: 5px; }
        .view-container { display: flex; gap: 20px; justify-content: center; width: 100%; flex-wrap: wrap; }
        .canvas-wrap { background: var(--panel); padding: 10px; border-radius: 4px; border: 1px solid #444; text-align: center; position: relative; }
        canvas { background: #000; cursor: crosshair; image-rendering: pixelated; }
        button { background: var(--accent); color: #000; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        button:hover { filter: brightness(1.2); box-shadow: 0 0 10px var(--accent); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }
        .label-tag { font-size: 0.75rem; color: var(--accent); margin-bottom: 5px; display: block; font-weight: bold; }
        .pass-info { position: absolute; top: 15px; right: 20px; color: #ff00ff; font-weight: bold; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 4px; border: 1px solid #ff00ff; }
        input[type="range"] { accent-color: var(--accent); }
    </style>
</head>
<body>

    <div class="controls">
        <div class="group"><button onclick="generateComplexMaze()">1. Generate Multi-Path Maze</button></div>
        <div class="group">
            <label class="label-tag">Grid Size</label>
            <input type="range" id="gridSize" min="15" max="35" step="2" value="21" onchange="generateComplexMaze()">
        </div>
        <div class="group">
            <label class="label-tag">Robot Speed</label>
            <input type="range" id="speed" min="5" max="400" value="50" style="direction: rtl;">
        </div>
        <div class="group">
            <button id="startBtn" disabled style="background: #39ff14;">2. Start 3-Pass Solve</button>
        </div>
    </div>

    <div class="view-container">
        <div class="canvas-wrap">
            <span class="label-tag">REALITY (Select Start & Goal)</span>
            <canvas id="realCanvas"></canvas>
        </div>
        <div class="canvas-wrap">
            <span class="label-tag">ROBOT BRAIN (Discovering Shortest)</span>
            <div id="passDisplay" class="pass-info">READY</div>
            <canvas id="robotCanvas"></canvas>
        </div>
    </div>

<script>
const rCanvas = document.getElementById('realCanvas');
const bCanvas = document.getElementById('robotCanvas');
const rCtx = rCanvas.getContext('2d');
const bCtx = bCanvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const speedInput = document.getElementById('speed');
const passDisplay = document.getElementById('passDisplay');

let SIZE, CELL;
let grid = [], discovered = [], flood = [], bestPath = [];
let startPos = null, goalPos = null, robot = {x:0, y:0};
let isSolving = false;

/** * ADVANCED GENERATION: PRIM'S + BRAIDING 
 * Creates a maze with multiple potential routes.
 */
function generateComplexMaze() {
    SIZE = parseInt(document.getElementById('gridSize').value);
    CELL = Math.floor(550 / SIZE);
    rCanvas.width = bCanvas.width = SIZE * CELL;
    rCanvas.height = bCanvas.height = SIZE * CELL;
    
    grid = Array.from({length: SIZE}, () => Array(SIZE).fill(1));
    discovered = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    bestPath = []; startPos = null; goalPos = null;
    startBtn.disabled = true;
    passDisplay.innerText = "READY";

    let walls = [];
    const addWalls = (x, y) => {
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
            let nx = x + dx, ny = y + dy;
            if (nx > 0 && nx < SIZE - 1 && ny > 0 && ny < SIZE - 1 && grid[ny][nx] === 1) {
                walls.push({x: nx, y: ny, px: x, py: y});
            }
        });
    };

    // Prim's Logic
    grid[1][1] = 0;
    addWalls(1, 1);

    while (walls.length > 0) {
        let idx = Math.floor(Math.random() * walls.length);
        let {x, y, px, py} = walls.splice(idx, 1)[0];

        // Direction of the wall
        let dx = x - px, dy = y - py;
        let nx = x + dx, ny = y + dy;

        if (nx > 0 && nx < SIZE - 1 && ny > 0 && ny < SIZE - 1 && grid[ny][nx] === 1) {
            grid[y][x] = 0;
            grid[ny][nx] = 0;
            addWalls(nx, ny);
        }
    }

    // BRAIDING: Randomly remove extra walls to create cycles (Multiple solutions)
    for (let i = 0; i < SIZE; i++) {
        let rx = Math.floor(Math.random() * (SIZE - 2)) + 1;
        let ry = Math.floor(Math.random() * (SIZE - 2)) + 1;
        if (grid[ry][rx] === 1) grid[ry][rx] = 0;
    }

    render();
}

rCanvas.addEventListener('mousedown', (e) => {
    if(isSolving) return;
    const rect = rCanvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / CELL);
    const y = Math.floor((e.clientY - rect.top) / CELL);
    if(grid[y][x] === 1) return; 
    
    if(!startPos) { startPos = {x, y}; robot = {...startPos}; } 
    else if(!goalPos) { goalPos = {x, y}; startBtn.disabled = false; } 
    else { startPos = {x, y}; robot = {...startPos}; goalPos = null; startBtn.disabled = true; }
    render();
});

function calculateFlood(target) {
    flood = Array.from({length: SIZE}, () => Array(SIZE).fill(999));
    if(!target) return;
    let queue = [{...target, d: 0}];
    flood[target.y][target.x] = 0;
    while(queue.length > 0) {
        let {x, y, d} = queue.shift();
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
            let nx = x + dx, ny = y + dy;
            if(nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && !discovered[ny][nx] && flood[ny][nx] === 999) {
                flood[ny][nx] = d + 1;
                queue.push({x: nx, y: ny, d: d+1});
            }
        });
    }
}

function render() {
    [ {ctx: rCtx, type: 'real'}, {ctx: bCtx, type: 'brain'} ].forEach(cfg => {
        cfg.ctx.clearRect(0, 0, rCanvas.width, rCanvas.height);
        for(let y=0; y<SIZE; y++) {
            for(let x=0; x<SIZE; x++) {
                if(cfg.type === 'real') {
                    cfg.ctx.fillStyle = grid[y][x] === 1 ? "#333" : "#000";
                } else {
                    if (bestPath.some(p => p.x === x && p.y === y)) cfg.ctx.fillStyle = "rgba(0, 251, 255, 0.5)";
                    else if(discovered[y][x]) cfg.ctx.fillStyle = "#500";
                    else cfg.ctx.fillStyle = "#000";
                }
                cfg.ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
                cfg.ctx.strokeStyle = "#1a1a1a";
                cfg.ctx.strokeRect(x*CELL, y*CELL, CELL, CELL);

                if(cfg.type === 'brain' && !discovered[y][x] && flood[y][x] < 999) {
                    cfg.ctx.fillStyle = "#00fbff";
                    cfg.ctx.font = `bold ${CELL/2.1}px Arial`;
                    cfg.ctx.textAlign = "center";
                    cfg.ctx.fillText(flood[y][x], x*CELL+CELL/2, y*CELL+CELL/1.6);
                }
            }
        }
        if(startPos) { cfg.ctx.fillStyle = "#007bff"; cfg.ctx.fillRect(startPos.x*CELL+2, startPos.y*CELL+2, CELL-4, CELL-4); }
        if(goalPos) { cfg.ctx.fillStyle = "gold"; cfg.ctx.fillRect(goalPos.x*CELL+2, goalPos.y*CELL+2, CELL-4, CELL-4); }
        cfg.ctx.fillStyle = "#fff";
        cfg.ctx.beginPath();
        cfg.ctx.arc(robot.x*CELL+CELL/2, robot.y*CELL+CELL/2, CELL/3, 0, 7);
        cfg.ctx.fill();
    });
}

async function runPass(target, passNum) {
    passDisplay.innerText = `PASS ${passNum}/3`;
    while(robot.x !== target.x || robot.y !== target.y) {
        // Sensor check around robot
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
            let nx = robot.x + dx, ny = robot.y + dy;
            if(nx>=0 && nx < SIZE && ny >= 0 && ny < SIZE && grid[ny][nx] === 1) discovered[ny][nx] = true;
        });

        calculateFlood(target);
        let best = null, minD = 1000;
        
        // Find best neighbor
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
            let nx = robot.x + dx, ny = robot.y + dy;
            if(nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && !discovered[ny][nx]) {
                if(flood[ny][nx] < minD) { minD = flood[ny][nx]; best = {x: nx, y: ny}; }
            }
        });

        if(!best) break;
        robot = best;
        if(passNum === 3) bestPath.push({...robot});
        render();
        await new Promise(r => setTimeout(r, speedInput.value));
    }
}

async function solveSequence() {
    isSolving = true;
    startBtn.disabled = true;
    discovered = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    bestPath = [];
    await runPass(goalPos, 1);
    await runPass(startPos, 2);
    await runPass(goalPos, 3);
    passDisplay.innerText = "OPTIMIZED";
    isSolving = false;
}

startBtn.onclick = solveSequence;
generateComplexMaze();
</script>
</body>
</html>
